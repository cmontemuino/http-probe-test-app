name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          major="$(echo "$version" | cut -d. -f1)"
          minor="$(echo "$version" | cut -d. -f2)"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "major=v${major}" >> "$GITHUB_OUTPUT"
          echo "major_minor=v${major}.${minor}" >> "$GITHUB_OUTPUT"

      - name: Compute build args
        id: buildargs
        shell: bash
        run: |
          set -euo pipefail
          echo "git_commit=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.tags.outputs.tag }}
            GIT_COMMIT=${{ steps.buildargs.outputs.git_commit }}
          tags: |
            ghcr.io/cmontemuino/http-probe-test-app:${{ steps.tags.outputs.tag }}
            ghcr.io/cmontemuino/http-probe-test-app:${{ steps.tags.outputs.major_minor }}
            ghcr.io/cmontemuino/http-probe-test-app:${{ steps.tags.outputs.major }}
            ghcr.io/cmontemuino/http-probe-test-app:latest
