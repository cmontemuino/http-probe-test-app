apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-probe-test-app
  labels:
    app: http-probe-test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: http-probe-test-app
  template:
    metadata:
      labels:
        app: http-probe-test-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: app
        image: ghcr.io/cmontemuino/http-probe-test-app:latest
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: PREFIX
          value: "probe"
        - name: CLUSTER_LABEL
          value: "my-cluster"
        - name: EXTRA_LATENCY_MS
          value: "0"
        - name: FAIL_LIVENESS_AFTER_N_REQUESTS
          value: "0"
        - name: FAIL_READINESS_AFTER_N_REQUESTS
          value: "0"
        - name: READY_DELAY_SECONDS
          value: "0"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
